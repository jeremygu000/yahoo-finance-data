services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - market_data:/data
    env_file:
      - .env
    environment:
      - MARKET_DATA_DIR=/data/parquet
      - MARKET_DATA_LOG_DIR=/data/logs
      - MARKET_DATA_CORS_ORIGINS=http://localhost:${NGINX_PORT:-80}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${NGINX_PORT:-80}}
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  fetch:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - market_data:/data
    env_file:
      - .env
    environment:
      - MARKET_DATA_DIR=/data/parquet
      - MARKET_DATA_LOG_DIR=/data/logs
    command: ["uv", "run", "market-data", "fetch", "--full"]
    profiles:
      - init

volumes:
  market_data:
